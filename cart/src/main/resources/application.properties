spring.application.name=cart
server.port=8084
server.servlet.context-path=/cart
springdoc.api-docs.path=/openapi
springdoc.swagger-ui.path=/docs

spring.datasource.url=jdbc:mysql://localhost:3306/cartdb?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=cart
spring.datasource.password=cartpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.client-type=lettuce