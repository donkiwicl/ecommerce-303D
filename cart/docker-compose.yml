services:
  mysql:
    image: mysql:8.4
    container_name: cart-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cartdb
      MYSQL_USER: cart
      MYSQL_PASSWORD: cartpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cart:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart-ms
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cartdb?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=cart
      - SPRING_DATASOURCE_PASSWORD=cartpass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/cart/openapi"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: