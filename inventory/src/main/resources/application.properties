spring.application.name=inventory
server.port=${SERVER_PORT:8083}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/inventory}
server.shutdown=graceful
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:200}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:20s}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never

info.app.name=${spring.application.name}
info.app.environment=${APP_ENVIRONMENT:local}

springdoc.api-docs.path=/openapi
springdoc.swagger-ui.path=/docs
