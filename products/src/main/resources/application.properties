# --- Configuración de Conexión a Oracle Cloud ---
# Usamos la ruta interna /app/wallet que definimos en el volumen de Docker
spring.datasource.url=jdbc:oracle:thin:@productsdb_high?TNS_ADMIN=/app/wallet
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- Configuración de JPA / Hibernate ---
# 'update' creará las tablas en Oracle si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect